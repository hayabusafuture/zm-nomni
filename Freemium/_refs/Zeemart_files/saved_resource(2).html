<style>

  body {
    overflow: hidden !important;
  }

  /* Scoped reset — only affects children of .nomni-topbar */
  .nomni-topbar *,
  .nomni-topbar *::before,
  .nomni-topbar *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  .nomni-topbar {
    --nomni-tb-green: #2AC864;
    --nomni-tb-bg: #0b3d1a;
    --nomni-tb-font-sans: 'Hanken Grotesk', sans-serif;
    --nomni-tb-font-serif: 'Fraunces', serif;

    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    width: 100%;
    background: var(--nomni-tb-bg);
    background-image: radial-gradient(
      ellipse 60% 120% at 30% 50%,
      rgba(22, 90, 40, 0.7) 0%,
      transparent 100%
    );
    font-family: var(--nomni-tb-font-sans);
    opacity: 0;
    transform: translateY(-100%);
    animation: nomniTbSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }

  /* Keyframe namespaced to nomniTb — no clash with nomni-abacus-banner keyframes */
  @keyframes nomniTbSlideIn {
    from { opacity: 0; transform: translateY(-100%); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nomni-topbar__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 24px;
  }

  .nomni-topbar__left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .nomni-topbar__icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }

  .nomni-topbar__icon svg {
    width: 14px;
    height: 16px;
  }

  .nomni-topbar__divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .nomni-topbar__message {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    line-height: 1;
    white-space: nowrap;
  }

  .nomni-topbar__message strong {
    font-weight: 700;
  }

  .nomni-topbar__italic {
    font-family: var(--nomni-tb-font-serif);
    font-style: italic;
    font-weight: 400;
    color: var(--nomni-tb-green);
  }

  .nomni-topbar__cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--nomni-tb-green);
    color: #000;
    font-family: var(--nomni-tb-font-sans);
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: 999px;
    padding: 9px 18px;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.2s ease, gap 0.25s ease, transform 0.2s ease;
  }

  .nomni-topbar__cta:hover {
    background: #34e070;
    transform: translateY(-1px);
    gap: 11px;
  }

  .nomni-topbar__cta__arrow {
    display: inline-block;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .nomni-topbar__cta:hover .nomni-topbar__cta__arrow {
    transform: translateX(3px);
  }

  /* ── Tablet ── */
  @media (max-width: 900px) {
    .nomni-topbar__message {
      white-space: normal;
      font-size: 14px;
      display: initial;
    }
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .nomni-topbar__inner {
      padding: 10px 16px;
      gap: 10px;
    }
	  
	  .nomni-topbar__divider {
		  display: none;
	  }
	  
	  .nomni-topbar__left {
		  gap: 4px;
	  }

    .nomni-topbar__message {
      font-size: 14px;
    }

    .nomni-topbar__cta {
      font-size: 14px;
      padding: 8px 14px;
    }
  }

  /* ── Very small ── */
  @media (max-width: 380px) {
    .nomni-topbar__icon,
    .nomni-topbar__divider {
      display: none;
    }
  }
</style>

<script>
(function () {
  function applyOffset() {
    var bar = document.querySelector('.nomni-topbar');
    if (!bar) return;
    var barH = bar.getBoundingClientRect().height;
 
    // Push body content down
    document.body.style.paddingTop = barH + 'px';
 
    // Offset the desktop header
    var masthead = document.getElementById('masthead');
    if (masthead) {
      masthead.style.top = barH + 'px';
    }
 
    // Mobile canvas menu: masthead height + topbar height
    var mobileMenu = document.querySelector('.mobile-canvas-menu');
    if (mobileMenu && masthead) {
      var mastheadH = masthead.getBoundingClientRect().height;
      mobileMenu.style.top = (mastheadH + barH) + 'px';
    }
  }
 
  window.addEventListener('DOMContentLoaded', function () {
    setTimeout(applyOffset, 650);
  });
 
  window.addEventListener('resize', applyOffset);
})();
</script>
 
        <script type="module">
            let height = 0

            function sendEmbedHeight() {
                window.parent.postMessage({
                    embedHeight: height
                }, "*")
            }

            const observer = new ResizeObserver((entries) => {
                if (entries.length !== 1) return
                const entry = entries[0]
                if (entry.target !== document.body) return

                height = entry.contentRect.height
                sendEmbedHeight()
            })

            observer.observe(document.body)

            window.addEventListener("message", (event) => {
                if (event.source !== window.parent) return
                if (event.data !== "getEmbedHeight") return
                sendEmbedHeight()
            })
        </script>
